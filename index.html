<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ater V9 - Senior AI Architecture</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; margin: 0; color: #f0f0f0; display: flex; flex-direction: column; height: 100vh; }
        
        .toolbar { background: #111; padding: 10px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 2px solid #333; }
        .toolbar h1 { margin: 0; font-size: 1.1rem; color: #007bff; }
        
        #viewer-container { flex-grow: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        
        /* Página com Feedback de Processamento */
        .page-container { position: relative; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .page-loader { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 50;
            display: none; align-items: center; justify-content: center; flex-direction: column;
            backdrop-filter: blur(2px);
        }
        .page-container.processing .page-loader { display: flex; }
        
        /* Spinner */
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tarja { position: absolute; z-index: 20; border: 1px solid rgba(0,0,0,0.1); }
        .tarja.ai { background: rgba(153, 50, 204, 0.5); border-color: #9932cc; }

        /* Rodapé com Sinais de Trabalho */
        #footer { background: #111; border-top: 1px solid #333; padding: 10px 20px; }
        .status-item { font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .indicator { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .indicator.active { background: #ffc107; box-shadow: 0 0 8px #ffc107; animation: pulse 1.5s infinite; }
        .indicator.ready { background: #28a745; box-shadow: 0 0 8px #28a745; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .progress-track { width: 200px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-left: 10px; display: none; }
        #ai-progress-fill { width: 0%; height: 100%; background: #007bff; transition: width 0.3s; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

    <div class="toolbar">
        <h1>ATER V9</h1>
        <input type="file" id="file-input" accept="application/pdf" disabled />
        <span id="load-msg" style="font-size: 12px; color: #888;">Inicializando motor de IA...</span>
    </div>

    <div id="viewer-container"></div>

    <div id="footer">
        <div class="status-item">
            <div id="ai-indicator" class="indicator"></div>
            <span id="ai-status-text">Carregando IA...</span>
            <div id="ai-progress-track" class="progress-track"><div id="ai-progress-fill"></div></div>
        </div>
    </div>

    <script type="module">
        // --- 1. Lógica do Web Worker (IA Isolada) ---
        // Criamos o código do worker como uma string para usar via Blob
        const workerCode = `
            import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
            env.allowLocalModels = false;
            let nerPipeline;

            self.onmessage = async (e) => {
                const { type, text, pageIndex } = e.data;

                if (type === 'init') {
                    nerPipeline = await pipeline('token-classification', 'Xenova/bert-base-multilingual-cased-ner-hrl', {
                        quantized: true,
                        progress_callback: (p) => self.postMessage({ type: 'progress', progress: p })
                    });
                    self.postMessage({ type: 'ready' });
                }

                if (type === 'analyze') {
                    const entities = await nerPipeline(text);
                    const names = entities
                        .filter(ent => (ent.entity_group === 'PER' || ent.entity_group === 'ORG') && ent.score > 0.6)
                        .map(ent => ent.word.replace(/#/g, '').trim())
                        .filter(w => w.length > 2);
                    self.postMessage({ type: 'result', names, pageIndex });
                }
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const aiWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });

        // --- 2. Elementos e Estado ---
        const UI = {
            file: document.getElementById('file-input'),
            statusText: document.getElementById('ai-status-text'),
            indicator: document.getElementById('ai-indicator'),
            progressTrack: document.getElementById('ai-progress-track'),
            progressFill: document.getElementById('ai-progress-fill'),
            viewer: document.getElementById('viewer-container'),
            loadMsg: document.getElementById('load-msg')
        };

        const state = { pages: [] };

        // --- 3. Comunicação com o Worker ---
        aiWorker.postMessage({ type: 'init' });

        aiWorker.onmessage = (e) => {
            const { type, progress, names, pageIndex } = e.data;

            if (type === 'progress') {
                UI.progressTrack.style.display = 'block';
                if (progress.status === 'progress') {
                    UI.progressFill.style.width = `${progress.progress}%`;
                }
            }

            if (type === 'ready') {
                UI.indicator.className = 'indicator ready';
                UI.statusText.textContent = "IA Pronta e Offline";
                UI.progressTrack.style.display = 'none';
                UI.file.disabled = false;
                UI.loadMsg.textContent = "Selecione um PDF para anonimizar.";
            }

            if (type === 'result') {
                applyAIResults(pageIndex, names);
            }
        };

        // --- 4. Renderização e Gatilho da IA ---
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        UI.file.onchange = async (e) => {
            const file = e.target.files[0];
            const buffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
            UI.viewer.innerHTML = '';
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                renderPageStructure(page, i-1);
            }
        };

        async function renderPageStructure(page, index) {
            const viewport = page.getViewport({ scale: 1.5 });
            const container = document.createElement('div');
            container.className = 'page-container processing'; // Começa com sinal de "processando"
            container.style.width = viewport.width + 'px';
            container.style.height = viewport.height + 'px';

            container.innerHTML = `
                <canvas width="${viewport.width}" height="${viewport.height}"></canvas>
                <div class="interaction-layer" style="position:absolute; inset:0; z-index:10;"></div>
                <div class="page-loader"><div class="spinner"></div><div style="margin-top:10px; font-size:12px; color:white;">IA Analisando...</div></div>
            `;

            UI.viewer.appendChild(container);
            const canvas = container.querySelector('canvas');
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;

            // Coleta texto e envia para o Worker (IA) em background
            const textContent = await page.getTextContent();
            const fullText = textContent.items.map(i => i.str).join(' ');
            
            state.pages[index] = { container, textContent, viewport };
            
            // Sinal Visual de Trabalho no Rodapé
            UI.indicator.className = 'indicator active';
            UI.statusText.textContent = `Analisando página ${index + 1}...`;

            aiWorker.postMessage({ type: 'analyze', text: fullText, pageIndex: index });
        }

        function applyAIResults(pageIndex, names) {
            const pageData = state.pages[pageIndex];
            const layer = pageData.container.querySelector('.interaction-layer');
            
            // Remove o sinal de carregamento da página
            pageData.container.classList.remove('processing');

            // Lógica de desenho das tarjas (idêntica à V8) baseada nos 'names' retornados
            // [...] 
            
            UI.indicator.className = 'indicator ready';
            UI.statusText.textContent = "IA Pronta";
        }
    </script>
</body>
</html>
