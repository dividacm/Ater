<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ater V5 - Anonimização Profissional</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; margin: 0; display: flex; flex-direction: column; height: 100vh; color: #f0f0f0; }
        
        /* Barra de Ferramentas */
        .toolbar { background: #111; padding: 10px 20px; display: flex; gap: 12px; align-items: center; border-bottom: 2px solid #333; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .toolbar h1 { margin: 0 20px 0 0; font-size: 1.1rem; color: #007bff; text-transform: uppercase; letter-spacing: 2px; }
        .toolbar input[type="file"] { font-size: 12px; background: #222; color: #ccc; border: 1px solid #444; padding: 5px; border-radius: 3px; }
        .toolbar button { background: #333; color: white; border: 1px solid #444; padding: 7px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .toolbar button.active { background: #007bff; border-color: #0056b3; font-weight: bold; }
        .toolbar button:hover:not(:disabled) { background: #444; }
        .toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }
        
        /* Área Principal */
        #viewer-container { flex-grow: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 40px; background: #333639; }
        
        /* Contêiner da Página */
        .page-container { position: relative; background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .interaction-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: default; }
        .interaction-layer.draw-mode { cursor: crosshair; }
        
        /* Elementos de Tarja */
        .tarja { position: absolute; z-index: 60; border: 2px solid rgba(0,0,0,0.1); cursor: pointer; }
        .tarja.auto { background: rgba(0, 123, 255, 0.45); border-color: #007bff; } /* Automáticas: Azuis */
        .tarja.manual { background: rgba(0, 0, 0, 0.75); border-color: #000; } /* Manuais: Escuras */
        .tarja.drawing { background: rgba(255, 193, 7, 0.3); border: 2px dashed #ffc107; }
        
        /* Botão de Remoção */
        .tarja-remove { position: absolute; top: -10px; right: -10px; background: #dc3545; color: white; width: 20px; height: 20px; border-radius: 50%; 
                         text-align: center; line-height: 18px; font-size: 12px; font-weight: bold; cursor: pointer; display: none; z-index: 30; border: 1px solid #fff; }
        .tarja:hover { outline: 2px solid #ffc107; }
        .tarja:hover .tarja-remove { display: block; }

        #status-bar { padding: 6px 20px; background: #111; font-size: 11px; color: #777; border-top: 1px solid #333; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="toolbar">
        <h1>ATER V5</h1>
        <input type="file" id="file-input" accept="application/pdf" />
        <button id="btn-mode-view" class="active">Navegar</button>
        <button id="btn-mode-draw" disabled>Desenhar Tarja</button>
        <button id="btn-export" disabled>Exportar PDF Seguro</button>
    </div>

    <div id="viewer-container"></div>
    <div id="status-bar">Pronto para processamento de PDF.</div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Padrões de Detecção Automática
        const PATTERNS = {
            CPF: /\b\d{3}\.\d{3}\.\d{3}-\d{2}\b|\b\d{11}\b/g,
            RG: /\b\d{1,2}\.\d{3}\.\d{3}-[\dX]\b/gi,
            CEP: /\b\d{2}\.\d{3}-\d{3}\b|\b\d{5}-\d{3}\b/g,
            Telefone: /\(?\d{2}\)?\s?\d{4,5}-?\d{4}/g,
            Endereco: /\b(Rua|Avenida|Av\.|Travessa|Bairro|Alameda|Rodovia|Rod\.)\b\s+[^,\.\n\r]+/gi,
            NomesMaiusculos: /[A-ZÁÉÍÓÚÀÂÊÔÃÕÇ]{2,}(?:\s+[A-ZÁÉÍÓÚÀÂÊÔÃÕÇ]{1,})+/g
        };

        const state = {
            pdfDoc: null,
            pages: [],
            mode: 'view',
            isDrawing: false,
            startX: 0, startY: 0,
            currentTarja: null
        };

        const UI = {
            file: document.getElementById('file-input'),
            btnView: document.getElementById('btn-mode-view'),
            btnDraw: document.getElementById('btn-mode-draw'),
            btnExport: document.getElementById('btn-export'),
            viewer: document.getElementById('viewer-container'),
            status: document.getElementById('status-bar')
        };

        UI.btnView.onclick = () => setMode('view');
        UI.btnDraw.onclick = () => setMode('draw');

        function setMode(m) {
            state.mode = m;
            UI.btnView.classList.toggle('active', m === 'view');
            UI.btnDraw.classList.toggle('active', m === 'draw');
            state.pages.forEach(p => p.layer.classList.toggle('draw-mode', m === 'draw'));
        }

        UI.file.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            UI.status.textContent = "Processando... Extraindo texto e coordenadas.";
            UI.viewer.innerHTML = '';
            state.pages = [];
            
            const buffer = await file.arrayBuffer();
            state.pdfDoc = await pdfjsLib.getDocument({ data: buffer }).promise;
            
            for (let i = 1; i <= state.pdfDoc.numPages; i++) {
                await renderAndProcessPage(i);
            }
            
            UI.status.textContent = `Analise concluída: ${state.pdfDoc.numPages} páginas. Revise as marcações azuis antes de exportar.`;
            UI.btnDraw.disabled = false;
            UI.btnExport.disabled = false;
        };

        async function renderAndProcessPage(num) {
            const scale = 1.5;
            const page = await state.pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });

            const container = document.createElement('div');
            container.className = 'page-container';
            container.style.width = viewport.width + 'px';
            container.style.height = viewport.height + 'px';

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            const layer = document.createElement('div');
            layer.className = 'interaction-layer';

            container.append(canvas, layer);
            UI.viewer.appendChild(container);

            const pageData = { canvas, ctx, layer, viewport };
            state.pages.push(pageData);

            await page.render({ canvasContext: ctx, viewport }).promise;
            
            // Detecção Automática de Dados Sensíveis
            const textContent = await page.getTextContent();
            runAutoDetection(textContent, pageData);
            
            setupManualDrawing(layer);
        }

       function runAutoDetection(content, pageData) {
            content.items.forEach(item => {
                const text = item.str.trim();
                if (!text) return; // Ignora itens vazios

                let foundMatch = false;
                
                for (const key in PATTERNS) {
                    if (PATTERNS[key].test(text)) {
                        foundMatch = true;
                        break;
                    }
                }

                if (foundMatch) {
                    const tx = pdfjsLib.Util.transform(pageData.viewport.transform, item.transform);
                    
                    // Adiciona um multiplicador de segurança de 2% na largura base
                    const width = (item.width * pageData.viewport.scale) * 1.02; 
                    
                    // tx[3] captura a escala vertical real da fonte na matriz
                    const height = item.height || Math.abs(tx[3]); 

                    // Offset para subir a tarja e centralizá-la no eixo Y
                    const offsetY = height * 0.85;

                    addTarjaToLayer(pageData.layer, tx[4], tx[5] - offsetY, width, height, true);
                }
            });
        }

        function addTarjaToLayer(layer, x, y, w, h, isAuto = false) {
            // AJUSTE AS MARGENS AQUI (em pixels)
            const paddingX = 6; // Expande para a esquerda e direita
            const paddingY = 3; // Expande para cima e para baixo

            const t = document.createElement('div');
            t.className = `tarja ${isAuto ? 'auto' : 'manual'}`;
            
            // Subtrai o padding do X e Y para a tarja crescer para trás e para cima
            t.style.left = (x - paddingX) + 'px';
            t.style.top = (y - paddingY) + 'px';
            
            // Soma o padding em dobro para compensar o recuo e crescer para frente e para baixo
            t.style.width = (w + (paddingX * 2)) + 'px'; 
            t.style.height = (h + (paddingY * 2)) + 'px';

            const del = document.createElement('div');
            del.className = 'tarja-remove';
            del.textContent = '×';
            del.onclick = (e) => { e.stopPropagation(); t.remove(); };
            
            t.appendChild(del);
            layer.appendChild(t);
        }

        // Lógica de Desenho Manual
        function setupManualDrawing(layer) {
            layer.onmousedown = (e) => {
                if (state.mode !== 'draw') return;
                state.isDrawing = true;
                const r = layer.getBoundingClientRect();
                state.startX = e.clientX - r.left;
                state.startY = e.clientY - r.top;

                state.currentTarja = document.createElement('div');
                state.currentTarja.className = 'tarja drawing';
                state.currentTarja.style.left = state.startX + 'px';
                state.currentTarja.style.top = state.startY + 'px';
                layer.appendChild(state.currentTarja);
            };

            layer.onmousemove = (e) => {
                if (!state.isDrawing) return;
                const r = layer.getBoundingClientRect();
                const x = e.clientX - r.left;
                const y = e.clientY - r.top;
                
                const w = Math.abs(x - state.startX);
                const h = Math.abs(y - state.startY);
                state.currentTarja.style.width = w + 'px';
                state.currentTarja.style.height = h + 'px';
                state.currentTarja.style.left = Math.min(x, state.startX) + 'px';
                state.currentTarja.style.top = Math.min(y, state.startY) + 'px';
            };

            layer.onmouseup = () => {
                if (!state.isDrawing) return;
                state.isDrawing = false;
                const w = parseFloat(state.currentTarja.style.width || 0);
                const h = parseFloat(state.currentTarja.style.height || 0);
                
                if (w > 5 && h > 5) {
                    const finalTarja = state.currentTarja;
                    finalTarja.className = 'tarja manual';
                    const del = document.createElement('div');
                    del.className = 'tarja-remove';
                    del.textContent = '×';
                    del.onclick = (e) => { e.stopPropagation(); finalTarja.remove(); };
                    finalTarja.appendChild(del);
                } else {
                    state.currentTarja.remove();
                }
                state.currentTarja = null;
            };
        }

        // Exportação e Rasterização (Segurança Máxima)
        UI.btnExport.onclick = () => {
            UI.status.textContent = "Rasterizando documento... Por favor, aguarde.";
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');

            state.pages.forEach((p, i) => {
                const tarjas = p.layer.querySelectorAll('.tarja');
                
                // Pinta as tarjas diretamente nos pixels do Canvas (Destruição do Dado)
                p.ctx.fillStyle = 'black'; // Cor da rasura no PDF exportado
                tarjas.forEach(t => {
                    p.ctx.fillRect(parseFloat(t.style.left), parseFloat(t.style.top), 
                                   parseFloat(t.style.width), parseFloat(t.style.height));
                });

                // Converte para imagem JPEG (85% qualidade para reduzir tamanho sem perder legibilidade)
                const img = p.canvas.toDataURL('image/jpeg', 0.85);
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = (p.canvas.height * pageWidth) / p.canvas.width;

                if (i > 0) doc.addPage();
                doc.addImage(img, 'JPEG', 0, 0, pageWidth, pageHeight);
            });

            doc.save('ater_v5_anonimizado.pdf');
            UI.status.textContent = "Documento anonimizado e baixado com sucesso.";
        };
    </script>
</body>
</html>
